server:
  port: 8080
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/legal_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai&useSSL=false&allowPublicKeyRetrieval=true
    username: root
    password: '123456'
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB

mybatis:
  mapper-locations: classpath:mapper/**/*.xml
  type-aliases-package: com.campus.legal.entity
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: CampusLegalPlatformSecretKeyForJwt2024MustBeLongEnough
  expire-hours: 72

file:
  upload-dir: ${user.dir}/uploads

logging:
  level:
    com.campus.legal.mapper: debug
